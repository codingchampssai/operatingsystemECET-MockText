<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Quiz Completed!</h1>
            <p>Check your score and save it to the leaderboard.</p>
        </header>

        <main>
            <div class="score-display">
                Score: <span id="score-text">0/0</span>
            </div>

            <div class="result-form">
                <label for="user-name" style="display:block; margin-bottom: 0.5rem; font-weight: 600; color: #1e3c72;">Enter Your Name:</label>
                <input type="text" id="user-name" class="name-input" placeholder="e.g. John Doe" autocomplete="off">
                <button id="save-btn" class="btn primary-btn">Save to Leaderboard</button>
            </div>
        </main>
    </div>

    <script src="result.js"></script>
</body>
</html>
